name: test

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-26
    permissions:
      contents: read
    env:
      MISE_HTTP_TIMEOUT: 120
      MISE_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: ./.github/actions/setup-macos
      - run: make lint
      - run: make build-app
      - name: Run tests in parallel
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build/ci-logs

          run_task() {
            local name="$1"
            shift
            local log="build/ci-logs/${name}.log"
            echo "::group::${name}"
            if "$@" >"$log" 2>&1; then
              cat "$log"
              echo "::endgroup::"
              return 0
            fi
            local status=$?
            cat "$log"
            echo "::endgroup::"
            return "$status"
          }

          run_task app-tests make test-app &
          pid_app=$!
          run_task cli-smoke make test-cli-smoke &
          pid_smoke=$!
          run_task cli-integration make test-cli-integration &
          pid_cli=$!

          failed=0
          wait "$pid_app" || failed=1
          wait "$pid_smoke" || failed=1
          wait "$pid_cli" || failed=1
          exit "$failed"
      - name: Upload xcresult bundle (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xcresult-${{ github.run_id }}-${{ github.run_attempt }}
          path: build/test-results/**/*.xcresult
          if-no-files-found: ignore
          retention-days: 7
