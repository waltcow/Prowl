name: Setup macOS build deps
description: Install + cache mise tools and GhosttyKit build outputs

runs:
  using: composite
  steps:
    - name: Mise cache
      uses: actions/cache@v4
      with:
        path: |
          ~/.local/share/mise
          ~/.cache/mise
        key: ${{ runner.os }}-${{ runner.arch }}-mise-v0-${{ hashFiles('**/mise.toml', '**/.mise.toml', '**/.tool-versions', '**/.config/mise.toml', '**/mise/config.toml', '**/mise.lock', '**/.mise.lock', '**/mise/config.lock', '**/.config/mise.lock', '**/mise.*.toml', '**/.mise.*.toml', '**/.config/mise.*.toml', '**/mise.*.lock', '**/.mise.*.lock', '**/.config/mise.*.lock') }}
        restore-keys: |
          ${{ runner.os }}-${{ runner.arch }}-mise-v0-
    - run: brew install mise
      shell: bash
    - run: mise install
      shell: bash

    - name: Ghostty cache key
      shell: bash
      run: |
        set -euo pipefail
        GHOSTTY_SHA="$(git rev-parse HEAD:ThirdParty/ghostty)"
        printf '%s\n' "GHOSTTY_SHA=$GHOSTTY_SHA" >> "$GITHUB_ENV"
    - name: Ghostty cache
      id: ghostty_cache
      uses: actions/cache@v4
      with:
        path: |
          Frameworks/GhosttyKit.xcframework
          Resources/ghostty
          Resources/terminfo
          .ghostty_hash
          .ghostty_build_stamp
        key: ${{ runner.os }}-${{ runner.arch }}-ghostty-v1-${{ env.GHOSTTY_SHA }}
    - name: Ensure ghostty
      if: steps.ghostty_cache.outputs.cache-hit != 'true'
      shell: bash
      run: |
        set -euo pipefail
        make ensure-ghostty
    - name: Sync ghostty marker files
      shell: bash
      run: |
        set -euo pipefail
        printf '%s\n' "$GHOSTTY_SHA" > .ghostty_hash
        touch .ghostty_build_stamp

    - name: SPM cache
      uses: actions/cache@v4
      with:
        path: ~/Library/Caches/supacode-spm-cache/SourcePackages
        key: ${{ runner.os }}-${{ runner.arch }}-spm-v0-${{ hashFiles('**/Package.resolved') }}
        restore-keys: |
          ${{ runner.os }}-${{ runner.arch }}-spm-v0-

    - name: Xcode compilation cache
      uses: actions/cache@v4
      with:
        path: ~/Library/Developer/Xcode/DerivedData/CompilationCache.noindex
        # Rotate when SPM deps or the Xcode project itself changes (target add/remove,
        # build setting tweaks). Day-to-day .swift edits keep the same primary key, so
        # `actions/cache` restores without re-uploading — the cache is content-addressed
        # by file hash, so unchanged files still hit; changed files miss and recompile
        # locally without invalidating the saved snapshot.
        key: ${{ runner.os }}-${{ runner.arch }}-xcode-compilation-cache-v1-${{ hashFiles('Package.resolved', 'supacode.xcodeproj/project.pbxproj') }}
        restore-keys: |
          ${{ runner.os }}-${{ runner.arch }}-xcode-compilation-cache-v1-
          ${{ runner.os }}-${{ runner.arch }}-xcode-compilation-cache-
